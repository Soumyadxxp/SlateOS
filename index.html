<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slate OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* =========================================================
           SLATE OS — design system
           ========================================================= */
        :root {
            --void: #0a0b0f;
            --void-2: #0e1015;
            --panel: #14161d;
            --panel-2: #1a1d26;
            --panel-3: #20232e;
            --line: rgba(233, 231, 226, 0.08);
            --line-strong: rgba(233, 231, 226, 0.16);
            --ink: #eae7e0;
            --ink-dim: #9b9ca6;
            --ink-faint: #5c5e6a;
            --brass: #cf9a5c;
            --brass-bright: #e3b579;
            --brass-dim: rgba(207, 154, 92, 0.18);
            --cyan: #5fd0c9;
            --cyan-dim: rgba(95, 208, 201, 0.16);
            --danger: #d9636b;
            --danger-dim: rgba(217, 99, 107, 0.18);
            --radius: 10px;
            --radius-sm: 6px;
            --font-disp: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
            --font-body: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            --shadow-lift: 0 20px 60px rgba(0, 0, 0, 0.55), 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        * {
            box-sizing: border-box;
        }
        html {
            font-size: 19.5px;
        }
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(1200px 700px at 18% -8%, rgba(207, 154, 92, 0.05), transparent 60%),
                radial-gradient(1000px 700px at 100% 100%, rgba(95, 208, 201, 0.045), transparent 55%),
                var(--void);
            font-family: var(--font-body);
            color: var(--ink);
        }

        #bezel {
            position: fixed;
            inset: 0;
            padding: 22px;
            background: linear-gradient(155deg, #1b1d24 0%, #101116 45%, #0a0b0f 100%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }
        #bezel::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(207, 154, 92, 0.10), transparent 30%);
            opacity: .5;
            mix-blend-mode: screen;
        }
        #screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--void-2);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6), var(--shadow-lift);
            overflow: hidden;
        }

        #boot-screen {
            position: absolute;
            inset: 0;
            background: var(--void-2);
            color: var(--brass-bright);
            padding: 44px 56px;
            font-family: var(--font-disp);
            font-size: 1.22rem;
            line-height: 1.8;
            white-space: pre-wrap;
            z-index: 500;
            overflow-y: auto;
        }
        #boot-screen .ok {
            color: var(--cyan);
        }
        #boot-screen .dim {
            color: var(--ink-faint);
        }
        .boot-flicker {
            animation: flicker .12s ease-out;
        }
        @keyframes flicker {
            0% {
                opacity: .4;
            }
            100% {
                opacity: 1;
            }
        }

        #desktop {
            position: absolute;
            inset: 0;
            display: none;
            z-index: 10;
        }
        #wallpaper {
            position: absolute;
            inset: 0;
            background: radial-gradient(900px 500px at 15% 10%, rgba(207, 154, 92, 0.07), transparent 60%),
                radial-gradient(700px 500px at 90% 90%, rgba(95, 208, 201, 0.06), transparent 55%),
                linear-gradient(160deg, #12141b 0%, #0c0d12 100%);
        }

        #topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(20, 22, 29, 0.86);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            z-index: 200;
            font-family: var(--font-disp);
            font-size: 0.98rem;
            letter-spacing: .02em;
        }
        .tb-left,
        .tb-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #topbar button.tb-btn {
            background: none;
            border: none;
            color: var(--ink-dim);
            font-family: var(--font-body);
            font-size: 1.02rem;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background .15s, color .15s;
        }
        #topbar button.tb-btn:hover {
            background: var(--panel-2);
            color: var(--ink);
        }
        .tb-icon {
            background: none;
            border: none;
            color: var(--ink-dim);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            transition: background .15s, color .15s;
        }
        .tb-icon:hover {
            background: var(--panel-2);
            color: var(--ink);
        }
        #topbar-clock {
            color: var(--ink);
            font-weight: 500;
            letter-spacing: .03em;
            font-size: 0.98rem;
        }
        .brand-chip {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: linear-gradient(155deg, var(--brass-bright), var(--brass) 60%, #8a6438);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-disp);
            font-weight: 700;
            font-size: 12px;
            color: #171008;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.25) inset, 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        .brand-name {
            color: var(--ink-dim);
            font-weight: 600;
            font-family: var(--font-body);
            font-size: 0.98rem;
        }

        #power-menu {
            position: absolute;
            top: 44px;
            right: 8px;
            background: var(--panel);
            border: 1px solid var(--line-strong);
            border-radius: var(--radius);
            padding: 6px;
            display: none;
            z-index: 300;
            min-width: 180px;
            box-shadow: var(--shadow-lift);
        }
        #power-menu button {
            display: flex;
            align-items: center;
            gap: 9px;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: none;
            border: none;
            color: var(--ink);
            font-family: var(--font-body);
            font-size: 1.03rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-sm);
        }
        #power-menu button:hover {
            background: var(--panel-2);
        }
        #power-menu button.danger:hover {
            background: var(--danger-dim);
            color: #ffb0b4;
        }

        #activities-overview {
            position: absolute;
            inset: 48px 0 0 0;
            display: none;
            z-index: 150;
            background: rgba(10, 11, 15, 0.78);
            backdrop-filter: blur(14px);
            padding: 72px 40px;
            align-items: flex-start;
            justify-content: center;
        }
        #activities-overview .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 26px;
            justify-content: center;
            max-width: 960px;
        }
        .app-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 16px 10px;
            border-radius: 14px;
            background: transparent;
            border: 1px solid transparent;
            transition: all .15s;
            color: var(--ink);
        }
        .app-grid .app-tile:hover {
            background: var(--panel-2);
            border-color: var(--line-strong);
            transform: translateY(-2px);
        }
        .app-tile span {
            font-size: 0.96rem;
            font-weight: 600;
            color: var(--ink-dim);
            letter-spacing: .01em;
            text-align: center;
            word-break: break-word;
            max-width: 100%;
        }
        .chip-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--panel-3), var(--panel-2));
            border: 1px solid var(--line-strong);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 6px 16px rgba(0, 0, 0, 0.35);
        }
        .chip-icon svg {
            width: 28px;
            height: 28px;
        }

        #desktop-icons {
            position: absolute;
            top: 68px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .dicon {
            width: 98px;
            text-align: center;
            cursor: pointer;
            padding: 12px 6px;
            border-radius: 12px;
            transition: background .15s;
        }
        .dicon:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .dicon .chip-icon {
            width: 54px;
            height: 54px;
            margin: 0 auto 6px;
        }
        .dicon .chip-icon svg {
            width: 24px;
            height: 24px;
        }
        .dicon span {
            font-size: 1.0rem;
            font-weight: 600;
            color: #d8d6ce;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        #dock {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: rgba(20, 22, 29, 0.86);
            backdrop-filter: blur(8px);
            border: 1px solid var(--line-strong);
            padding: 10px 12px;
            border-radius: 20px;
            z-index: 200;
            box-shadow: var(--shadow-lift);
        }
        .dock .app-tile {
            position: relative;
            padding: 6px 4px;
            flex-direction: column;
            gap: 0;
            cursor: pointer;
            border-radius: 8px;
            transition: background .15s;
        }
        .dock .app-tile:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .dock .app-tile .chip-icon {
            width: 48px;
            height: 48px;
        }
        .dock .app-tile .chip-icon svg {
            width: 22px;
            height: 22px;
        }
        .dock .app-tile:hover .chip-icon {
            transform: translateY(-3px);
        }
        .dock .chip-icon {
            transition: transform .15s;
        }
        .dock .running-dot {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--brass-bright);
            display: none;
        }
        .dock .app-tile.running .running-dot {
            display: block;
        }
        .dock-divider {
            width: 1px;
            align-self: stretch;
            background: var(--line-strong);
            margin: 4px 3px;
        }

        .win {
            position: absolute;
            min-width: 360px;
            min-height: 240px;
            background: var(--panel);
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            box-shadow: var(--shadow-lift);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--ink);
        }
        .win.focused {
            border-color: rgba(207, 154, 92, 0.4);
            box-shadow: var(--shadow-lift), 0 0 0 1px rgba(207, 154, 92, 0.25);
        }
        .win-titlebar {
            height: 46px;
            background: var(--panel-2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            cursor: grab;
            user-select: none;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }
        .win-titlebar:active {
            cursor: grabbing;
        }
        .win-controls {
            display: flex;
            gap: 6px;
            order: 1;
            align-items: center;
        }
        .win-controls button {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.6);
            transition: all .15s;
            background: rgba(255, 255, 255, 0.15);
        }
        .win-controls button:hover {
            transform: scale(1.1);
        }
        .win-controls button[data-act="close"] {
            background: var(--danger);
            color: #fff;
        }
        .win-controls button[data-act="close"]:hover {
            background: #ff7a82;
        }
        .win-controls button[data-act="min"] {
            background: var(--brass);
            color: #1a1d26;
        }
        .win-controls button[data-act="min"]:hover {
            background: var(--brass-bright);
        }
        .win-controls button[data-act="max"] {
            background: var(--cyan);
            color: #1a1d26;
        }
        .win-controls button[data-act="max"]:hover {
            background: #7fe0d8;
        }
        .win-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--ink-dim);
            order: 2;
            margin-left: 8px;
        }
        .win.focused .win-title {
            color: var(--ink);
        }
        .win-title svg {
            width: 16px;
            height: 16px;
            opacity: .8;
        }
        .win-body {
            flex: 1;
            overflow: auto;
            position: relative;
            background: var(--void-2);
        }
        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 18px;
            height: 18px;
            cursor: nwse-resize;
        }
        .resize-handle::after {
            content: "";
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 7px;
            height: 7px;
            border-right: 2px solid var(--line-strong);
            border-bottom: 2px solid var(--line-strong);
        }

        .mono-out {
            font-family: var(--font-disp);
            font-size: 1.15rem;
            padding: 18px;
            height: 100%;
            overflow-y: auto;
            background: var(--void-2);
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.7;
            color: var(--ink);
        }
        .term-line {
            margin: 0 0 1px;
        }
        .term-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 1px;
        }
        .term-input-row .prompt {
            white-space: nowrap;
            font-weight: 600;
        }
        .p-user {
            color: var(--cyan);
        }
        .p-at {
            color: var(--ink-faint);
        }
        .p-host {
            color: var(--cyan);
        }
        .p-colon {
            color: var(--ink-faint);
        }
        .p-path {
            color: var(--brass-bright);
        }
        .p-dollar {
            color: var(--ink-dim);
            margin-right: 2px;
        }
        .term-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--ink);
            font-family: var(--font-disp);
            font-size: 1.15rem;
            outline: none;
            padding: 2px 0;
        }
        .term-input-row input:disabled {
            opacity: .4;
        }
        .out-err {
            color: var(--danger);
        }
        .out-ok {
            color: var(--cyan);
        }
        .name-dir {
            color: var(--cyan);
            font-weight: 600;
        }
        .name-file {
            color: var(--ink);
        }
        .name-hidden {
            color: var(--ink-faint);
        }
        .grep-hit {
            background: var(--brass-dim);
            color: var(--brass-bright);
            border-radius: 2px;
        }

        .files-toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--line);
            font-size: 0.98rem;
            flex-shrink: 0;
            background: var(--panel);
            font-family: var(--font-disp);
        }
        .files-toolbar button {
            background: var(--panel-3);
            border: 1px solid var(--line-strong);
            color: var(--ink);
            padding: 6px 14px;
            border-radius: 7px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.96rem;
            font-weight: 600;
            transition: all .15s;
        }
        .files-toolbar button:hover {
            background: var(--panel-2);
            border-color: var(--brass-dim);
        }
        .files-toolbar .fpath {
            color: var(--brass-bright);
        }
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px 24px;
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }
        .f-item {
            text-align: center;
            cursor: pointer;
            padding: 14px 8px;
            border-radius: 12px;
            transition: background .15s, transform .1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .f-item:hover {
            background: var(--panel-2);
            transform: translateY(-2px);
        }
        .f-item .chip-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto;
            border-radius: 12px;
        }
        .f-item .chip-icon svg {
            width: 24px;
            height: 24px;
        }
        .f-name {
            font-size: 0.92rem;
            word-break: break-word;
            color: var(--ink-dim);
            font-weight: 500;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: normal;
            line-height: 1.3;
        }
        .f-empty {
            padding: 40px;
            color: var(--ink-faint);
            font-family: var(--font-disp);
            font-size: 0.98rem;
            text-align: center;
            width: 100%;
        }

        .editor-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
            font-family: var(--font-disp);
            font-size: 0.96rem;
            flex-shrink: 0;
        }
        .editor-toolbar input {
            flex: 1;
            background: var(--void-2);
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            color: var(--ink);
            padding: 6px 10px;
            font-family: var(--font-disp);
            font-size: 0.96rem;
            outline: none;
        }
        .editor-toolbar button {
            background: var(--brass-dim);
            border: 1px solid var(--brass);
            color: var(--brass-bright);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.94rem;
            transition: all .15s;
        }
        .editor-toolbar button:hover {
            background: rgba(207, 154, 92, 0.28);
        }
        .editor-status {
            color: var(--ink-faint);
            font-size: 0.86rem;
        }
        textarea.editor {
            width: 100%;
            height: calc(100% - 46px);
            background: var(--void-2);
            color: var(--ink);
            border: none;
            outline: none;
            font-family: var(--font-disp);
            font-size: 1.22rem;
            line-height: 1.65;
            padding: 18px;
            resize: none;
        }

        .pad {
            padding: 18px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 4px;
            border-bottom: 1px solid var(--line);
        }
        .settings-row label {
            font-size: 1.14rem;
            font-weight: 600;
            color: var(--ink);
        }
        .settings-row .hint {
            display: block;
            font-size: 0.89rem;
            font-weight: 400;
            color: var(--ink-faint);
            margin-top: 2px;
        }
        .settings-row select,
        .settings-row input[type="range"] {
            background: var(--panel-3);
            color: var(--ink);
            border: 1px solid var(--line-strong);
            border-radius: 7px;
            padding: 6px 12px;
            font-family: var(--font-body);
            font-size: 0.98rem;
        }
        .settings-row input[type="checkbox"] {
            accent-color: var(--brass);
            width: 20px;
            height: 20px;
        }
        .settings-section h4 {
            margin: 20px 0 6px;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--ink-faint);
            font-weight: 700;
        }

        .about-slate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 6px;
            text-align: center;
            padding: 20px;
            overflow-y: auto;
        }
        .about-slate .big-mark {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 12px;
            background: linear-gradient(155deg, var(--brass-bright), var(--brass) 55%, #8a6438);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-disp);
            font-weight: 800;
            font-size: 36px;
            color: #171008;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.3) inset, 0 10px 26px rgba(0, 0, 0, 0.5);
        }
        .about-slate .os-name {
            font-family: var(--font-disp);
            font-size: 1.56rem;
            font-weight: 700;
            color: var(--ink);
        }
        .about-slate .meta {
            margin-top: 14px;
            font-size: 0.98rem;
            color: var(--ink-dim);
            line-height: 1.9;
            font-family: var(--font-disp);
        }
        .about-slate .meta a {
            color: var(--cyan);
            text-decoration: none;
            border-bottom: 1px solid var(--cyan-dim);
            transition: color .15s;
        }
        .about-slate .meta a:hover {
            color: var(--brass-bright);
            border-bottom-color: var(--brass-bright);
        }
        .about-slate .credit {
            margin-top: 14px;

    <script>

        /* =========================================================

        const ICONS = {

            gear: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 12a7.4 7.4 0 00-.14-1.4l2-1.6-2-3.4-2.4.6a7.6 7.6 0 00-2.4-1.4L14 2h-4l-.5 2.8a7.6 7.6 0 00-2.4 1.4l-2.4-.6-2 3.4 2 1.6a7.4 7.4 0 000 2.8l-2 1.6 2 3.4 2.4-.6a7.6 7.6 0 002.4 1.4L10 22h4l.5-2.8a7.6 7.6 0 002.4-1.4l2.4.6 2-3.4-2-1.6c.1-.46.14-.93.14-1.4z"/></svg>`,

        };

        function iconSVG(name) { return ICONS[name] || ICONS.file; }

        function chip(name, size) { return `<div class="chip-icon" style="${size ? `width:${size}px;height:${size}px` : ''}">${iconSVG(name)}</div>`; }

        /* =========================================================
           AUDIO ENGINE
           ========================================================= */
        const AudioEngine = (() => {
            let ctx = null,
                master = null,
                humOsc = null,
                humGain = null,
                volume = 0.55;

            function ensure() {
                if (!ctx) { ctx = new(window.AudioContext || window.webkitAudioContext)();
                    master = ctx.createGain();
                    master.gain.value = volume;
                    master.connect(ctx.destination); }
                if (ctx.state === 'suspended') ctx.resume();
            }

            function tone(freq, dur, type = 'sine', vol = 0.1, delay = 0) {
                ensure();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = type;
                o.frequency.value = freq;
                g.gain.value = 0;
                o.connect(g);
                g.connect(master);
                const t0 = ctx.currentTime + delay;
                g.gain.setValueAtTime(0, t0);
                g.gain.linearRampToValueAtTime(vol, t0 + 0.008);
                g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
                o.start(t0);
                o.stop(t0 + dur + 0.02);
            }

            function click() { tone(1200, 0.03, 'sine', 0.09); }

            function keytick() { tone(900 + Math.random() * 250, 0.012, 'square', 0.045); }

            function chime() {
                ensure();
                [523, 659, 784].forEach((f, i) => tone(f, 0.4, 'sine', 0.10, i * 0.08));
            }

            function error() { tone(160, 0.2, 'sawtooth', 0.14); }

            function powerDown() {
                ensure();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(500, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.8);
                g.gain.setValueAtTime(0.20, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
                o.connect(g);
                g.connect(master);
                o.start();
                o.stop(ctx.currentTime + 0.85);
            }

            function startHum() {
                ensure();
                if (humOsc) return;
                humOsc = ctx.createOscillator();
                humGain = ctx.createGain();
                humOsc.type = 'sine';
                humOsc.frequency.value = 55;
                humGain.gain.value = 0.015;
                humOsc.connect(humGain);
                humGain.connect(master);
                humOsc.start();
            }

            function stopHum() {
                if (humOsc) { humOsc.stop();
                    humOsc = null; }
            }

            function setVolume(v) { volume = v; if (master) master.gain.value = v; }

            return { click, keytick, chime, error, powerDown, startHum, stopHum, setVolume, ensure };
        })();

        /* =========================================================
           CLOCK
           ========================================================= */
        function tickClock() { const d = new Date(); const tc = document.getElementById('topbar-clock'); if (tc) tc.textContent = d
                .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }); }
        setInterval(tickClock, 1000);
        tickClock();

        /* =========================================================
           VIRTUAL FILESYSTEM — case‑insensitive, with execute bit
           ========================================================= */
        class VirtualFS {
            constructor() {
                this.root = this._dir();
                this.cwd = '/home/slate';
                this.username = 'slate';
                this.hostname = 'slate-os';
                this.bootTime = Date.now();
                this._seed();
            }
            _dir(mode) { return { type: 'dir', mode: mode || 'drwxr-xr-x', mtime: Date.now(), children: {} }; }
            _file(content, mode) { return { type: 'file', mode: mode || '-rw-r--r--', mtime: Date.now(), content: content ||
                        '' }; }

            _findChild(node, name) {
                if (!node || node.type !== 'dir') return null;
                const lower = name.toLowerCase();
                for (const key in node.children) {
                    if (key.toLowerCase() === lower) return key;

            _seed() {
                this.mkdir('/bin');
                this.mkdir('/etc');
                this.mkdir('/home');
                this.mkdir('/root');
                this.mkdir('/usr');
                this.mkdir('/usr/bin');
                this.mkdir('/usr/lib');
                this.mkdir('/usr/local/bin');
                this.mkdir('/var');
                this.mkdir('/var/log');
                this.mkdir('/tmp');
                this.mkdir('/opt');
                this.mkdir('/mnt');
                this.mkdir('/srv');

                this.writeFile('/etc/hostname', 'slate-os\n');
                this.writeFile('/etc/hosts', '127.0.0.1 localhost\n::1 localhost\n');
                this.writeFile('/etc/os-release', 'NAME="Slate OS"\nVERSION="rolling"\nID=slate\nPRETTY_NAME="Slate OS"\n');
                this.writeFile('/etc/passwd', 'root:x:0:0:root:/root:/bin/bash\nslate:x:1000:1000:Slate:/home/slate:/bin/bash\n');
                this.writeFile('/etc/motd', 'Welcome to Slate OS — a machine built for the terminal.\n');
                this.writeFile('/etc/fstab', '# /etc/fstab\n/dev/sda1 / ext4 defaults 0 1\n');

                this.mkdir('/home/slate');
                this.mkdir('/home/slate/Documents');
                this.mkdir('/home/slate/Downloads');
                this.mkdir('/home/slate/Pictures');
                this.mkdir('/home/slate/Projects');
                this.mkdir('/home/slate/.config');
                this.mkdir('/home/slate/.ssh');

                this.writeFile('/home/slate/.bashrc',
                    '# ~/.bashrc\nexport PS1="\\\\u@\\\\h:\\\\w\\\\$ "\nalias ll="ls -la"\nalias la="ls -A"\nalias grep="grep --color=auto"\n');
                this.writeFile('/home/slate/Documents/notes.txt',
                    'Welcome to Slate OS.\n\nThis is a real, working simulated shell:\n  - pipes and redirection actually work\n  - files you edit are actually saved\n  - ls, grep, find, sed, awk behave like the real thing\n\nType `help` to see every command, or `man <command>` for details.\n'
                    );
                this.writeFile('/home/slate/Documents/todo.txt',
                    '- Explore the filesystem with ls / cd / find\n- Try: cat notes.txt | grep Slate\n- Try: ls -l | sort\n- Open Files and double-click something\n'
                    );
                this.writeFile('/home/slate/Projects/hello.sh', '#!/bin/bash\necho "Hello from Slate OS"\n', '-rwxr-xr-x');
                this.writeFile('/home/slate/Downloads/README.md', '# Slate OS\n\nA terminal-first desktop, rendered entirely in the browser.\n'
                    );
                this.writeFile('/var/log/system.log',
                    '[boot] slate-os kernel 6.12.0-slate initialized\n[boot] all services nominal\n');
                this.writeFile('/var/log/auth.log',
                    'Jan 1 00:00:00 slate sshd[123]: Accepted password for slate from 192.168.1.100\n');
                this.writeFile('/home/slate/test.sh', '#!/bin/bash\necho "Hello from a script!"\necho "Current directory: $(pwd)"\nls -l\necho "Done."\n',
                    '-rwxr-xr-x');
            }

            _norm(p) { if (!p) return '/'; const parts = p.split('/').filter(x => x && x !== '.'); const out = [];
                for (const part of parts) { if (part === '..') out.pop();
                    else out.push(part); } return '/' + out.join('/'); }

            resolve(p) {
                if (!p || p === '~') return '/home/' + this.username;
                if (p.startsWith('~/')) return this._norm('/home/' + this.username + '/' + p.slice(2));
                if (p.startsWith('/')) return this._norm(p);
                return this._norm(this.cwd + '/' + p);
            }

            _walk(path) {
                const norm = this._norm(path);
                if (norm === '/') return this.root;
                const parts = norm.split('/').filter(Boolean);
                let node = this.root;
                for (const part of parts) {
                    if (node.type !== 'dir') return null;
                    const key = this._findChild(node, part);
                    if (!key) return null;
                    node = node.children[key];
                }
                return node;
            }

            _parentOf(path) {
                const norm = this._norm(path);
                const parts = norm.split('/').filter(Boolean);
                if (parts.length === 0) return { parent: null, name: '', dirPath: '/' };
                const name = parts.pop();
                const parentPath = '/' + parts.join('/');
                const parent = this._walk(parentPath);
                if (!parent || parent.type !== 'dir') return { parent: null, name, dirPath: parentPath };
                const key = this._findChild(parent, name);
                return { parent, name: key || name, dirPath: parentPath };
            }

            exists(p) { return this._walk(p) !== null; }
            isDir(p) { const n = this._walk(p); return !!n && n.type === 'dir'; }
            isFile(p) { const n = this._walk(p); return !!n && n.type === 'file'; }
            isExecutable(p) { const n = this._walk(p); return n && n.type === 'file' && n.mode && n.mode.includes('x'); }
            stat(p) { return this._walk(p); }

            mkdir(p, recursive) {
                const norm = this._norm(p);
                const parts = norm.split('/').filter(Boolean);
                let node = this.root,
                    built = '';
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    built += '/' + part;
                    const key = this._findChild(node, part);
                    if (!key) {
                        if (i < parts.length - 1 && !recursive) return { ok: false, err: `mkdir: cannot create directory '${p}': No such file or directory` };
                        node.children[part] = this._dir();
                        node = node.children[part];
                    } else {
                        const child = node.children[key];
                        if (child.type !== 'dir') {
                            return { ok: false, err: `mkdir: cannot create directory '${p}': Not a directory` };
                        }
                        if (i === parts.length - 1 && !recursive) {
                            return { ok: false, err: `mkdir: cannot create directory '${p}': File exists` };
                        }
                        node = child;
                    }
                }
                return { ok: true };
            }

            touch(p) {
                if (this.exists(p)) { this._walk(p).mtime = Date.now(); return { ok: true }; }
                const { parent, name } = this._parentOf(p);
                if (!parent || parent.type !== 'dir') return { ok: false, err: `touch: cannot touch '${p}': No such file or directory` };
                parent.children[name] = this._file('');

            }

            writeFile(p, content, mode) {
                const { parent, name } = this._parentOf(p);
                if (!parent || parent.type !== 'dir') return false;
                const key = this._findChild(parent, name);
                if (key && parent.children[key].type === 'dir') return false;
                parent.children[name] = this._file(content, mode);
                return true;
            }

            appendFile(p, content) {
                const existing = this.isFile(p) ? this._walk(p).content : '';
                return this.writeFile(p, existing + content);
            }

            readFile(p) { const n = this._walk(p); return (n && n.type === 'file') ? n.content : null; }

                const n = this._walk(p);
                if (!n || n.type !== 'dir') return null;
                return Object.keys(n.children).map(name => {
                    const c = n.children[name];
                    return { name, isFile: c.type === 'file', mode: c.mode, mtime: c.mtime, size: c.type ===
                            'file' ? (c.content || '').length : this._dirSize(c) };

            }

            _dirSize(node) { let total = 0; for (const k in node.children) { const c = node.children[k];
                    total += c.type === 'file' ? (c.content || '').length : this._dirSize(c) + 4096; } return total; }

            rm(p, recursive, force) {
                const { parent, name } = this._parentOf(p);
                if (!parent || !parent.children[name]) { return force ? { ok: true } : { ok: false,
                        err: `rm: cannot remove '${p}': No such file or directory` }; }
                const node = parent.children[name];
                if (node.type === 'dir' && !recursive) { return { ok: false, err: `rm: cannot remove '${p}': Is a directory` }; }
                delete parent.children[name];
                return { ok: true };
            }

            rmdir(p) {
                const { parent, name } = this._parentOf(p);
                if (!parent || !parent.children[name]) return { ok: false, err: `rmdir: failed to remove '${p}': No such file or directory` };
                const node = parent.children[name];
                if (node.type !== 'dir') return { ok: false, err: `rmdir: failed to remove '${p}': Not a directory` };
                if (Object.keys(node.children).length > 0) return { ok: false,
                    err: `rmdir: failed to remove '${p}': Directory not empty` };
                delete parent.children[name];
                return { ok: true };
            }

            _clone(node) {
                if (node.type === 'file') return this._file(node.content, node.mode);
                const d = this._dir(node.mode);
                for (const k in node.children) d.children[k] = this._clone(node.children[k]);
                return d;
            }

            cp(src, dst, recursive) {
                const s = this._walk(src);
                if (!s) return { ok: false, err: `cp: cannot stat '${src}': No such file or directory` };
                if (s.type === 'dir' && !recursive) return { ok: false, err: `cp: -r not specified; omitting directory '${src}'` };
                let target = dst;
                if (this.isDir(dst)) {
                    const base = src.split('/').filter(Boolean).pop() || src;
                    target = this._norm(dst + '/' + base);
                }
                const { parent, name } = this._parentOf(target);
                if (!parent || parent.type !== 'dir') return { ok: false,
                    err: `cp: cannot create '${dst}': No such file or directory` };
                parent.children[name] = this._clone(s);
                return { ok: true };
            }

            mv(src, dst) {
                const s = this._walk(src);
                if (!s) return { ok: false, err: `mv: cannot stat '${src}': No such file or directory` };
                let target = dst;
                if (this.isDir(dst)) {
                    const base = src.split('/').filter(Boolean).pop() || src;
                    target = this._norm(dst + '/' + base);
                }
                const { parent, name } = this._parentOf(target);
                if (!parent || parent.type !== 'dir') return { ok: false,
                    err: `mv: cannot move to '${dst}': No such file or directory` };
                parent.children[name] = s;
                const sp = this._parentOf(src);
                if (sp.parent) delete sp.parent.children[sp.name];
                return { ok: true };
            }

            ln(src, dst, symbolic) {
                const s = this._walk(src);
                if (!s) return { ok: false, err: `ln: cannot stat '${src}': No such file or directory` };
                let target = dst;
                if (this.isDir(dst)) {
                    const base = src.split('/').filter(Boolean).pop() || src;
                    target = this._norm(dst + '/' + base);
                }
                const { parent, name } = this._parentOf(target);
                if (!parent || parent.type !== 'dir') return { ok: false,
                    err: `ln: cannot create '${dst}': No such file or directory` };
                if (parent.children[name]) return { ok: false, err: `ln: '${target}' already exists` };
                const linkContent = symbolic ? 'symlink:' + src : 'hardlink:' + src;
                parent.children[name] = this._file(linkContent, symbolic ? 'lrwxrwxrwx' : '-rw-r--r--');
                return { ok: true };
            }

            chmod(p, mode) {
                const n = this._walk(p);
                if (!n) return { ok: false, err: `chmod: cannot access '${p}': No such file or directory` };
                n.mode = mode;
                return { ok: true };
            }
        }

        /* =========================================================
           MARKUP HELPERS
           ========================================================= */
        const M1 = '\u0001',
            M2 = '\u0002',
            M3 = '\u0003';

        function mark(type, text) { return M1 + type + M2 + text + M3; }

        /* =========================================================
           COMMAND ENGINE — full Linux-like shell with job control
           ========================================================= */
        class CommandEngine {
            constructor(fs) {
                this.fs = fs;
                this.commands = {};
                this.aliases = { ll: 'ls -la', la: 'ls -A', l: 'ls -CF', h: 'history', grep: 'grep', cls: 'clear',
                    rm: 'rm -i' };
                this.env = { PATH: '/bin:/usr/bin:/usr/local/bin', HOME: '/home/slate', USER: 'slate', SHELL: '/bin/bash',
                    TERM: 'xterm-256color', LANG: 'en_US.UTF-8', PS1: '\\u@\\h:\\w\\$ ', OLDPWD: '' };
                this.history = [];
                this.historyIndex = -1;
                this.lastExit = 0;

                this.jobCounter = 0;

            cmd(name, fn) { this.commands[name.toLowerCase()] = fn; }

            _register() {
                const R = (n, f) => this.cmd(n, f.bind(this));
                // Core
                R('ls', this._ls);
                R('cd', this._cd);
                R('pwd', this._pwd);
                R('echo', this._echo);
                R('printf', this._printf);
                R('cat', this._cat);
                R('clear', this._clear);
                R('reset', this._clear);

                if (m) { this.env[m[1]] = m[2].replace(/^['"]|['"]$/g, ''); return this._ok(''); }
                return this._err('export', 'invalid syntax, use NAME=value'); }

            _unset(args) { if (!args.length) return this._err('unset', 'missing operand');
                for (const name of args) { delete this.env[name]; }
                return this._ok(''); }

            _env() { let out = ''; for (const k in this.env) out += `${k}=${this.env[k]}\n`; return this._ok(out); }

            _printenv(args) { if (!args.length) return this._env(); return this._ok((this.env[args[0]] || '') + '\n'); }

            _which(args) { const name = args[0]; if (!name) return this._ok('');
                if (this.aliases[name]) return this._ok(`${name}: aliased to ${this.aliases[name]}\n`);
                if (this.commands[name.toLowerCase()]) return this._ok(`/usr/bin/${name}\n`);
                return this._err('which', `no ${name} in ${this.env.PATH}`); }

            _type(args) { const name = args[0]; if (!name) return this._ok('');
                if (this.aliases[name]) return this._ok(`${name} is aliased to \`${this.aliases[name]}'\n`);
                if (this.commands[name.toLowerCase()]) return this._ok(`${name} is a shell builtin\n`);
                return this._err('type', `${name}: not found`); }

            _file(args) { const p = this.fs.resolve(args[0] || ''); if (!this.fs.exists(p)) return this._err('file',
                    `${args[0]}: No such file or directory`);
                return this._ok(`${args[0]}: ${this.fs.isDir(p)?'directory':'ASCII text'}\n`); }

            _stat(args) { const p = this.fs.resolve(args[0] || '');
                const node = this.fs._walk(p); if (!node) return this._err('stat',
                    `cannot stat '${args[0]}': No such file or directory`);
                const size = node.type === 'file' ? node.content.length : this.fs._dirSize(node);
                return this._ok(
                    `  File: ${args[0]}\n  Size: ${size}\t${node.type==='dir'?'directory':'regular file'}\nModify: ${new Date(node.mtime).toString()}\n  Mode: ${node.mode}\n`
                    ); }

            _sudo(args) { if (!args.length) return this._err('sudo', 'missing command');
                return this.execute(args[0], args.slice(1), ''); }

            _su(args) { const user = args[0] || 'root'; if (user === 'root' || user === 'slate') { this.fs.username = user;
                    this.env.USER = user; return this._ok(''); }
                return this._err('su', `user ${user} does not exist`); }

            _tree(args) { const start = this.fs.resolve(args[0] || '.');
                if (!this.fs.exists(start)) return this._err('tree', `${args[0]}: No such file or directory`);
                let out = (args[0] || '.') + '\n';
                const walk = (path, prefix) => { const items = (this.fs.listDir(path) || []).filter(e => !e.name.startsWith(
                        '.')).sort((a, b) => a.name.localeCompare(b.name));
                    items.forEach((it, i) => { const last = i === items.length - 1;
                        out += prefix + (last ? '└── ' : '├── ') + mark(it.isFile ? 'f' : 'd', it.name) + '\n'; if (!it
                            .isFile) walk(path + '/' + it.name, prefix + (last ? '    ' : '│   ')); }); };
                walk(start, '');
                return this._ok(out); }

            // ---------- execute with command chaining ----------
            execute(cmdName, args, stdin) {
                const lowerCmd = cmdName.toLowerCase();
                if (this.aliases[lowerCmd] && this.commands[lowerCmd] === undefined) {
                    const parts = this.aliases[lowerCmd].split(' ');
                    return this.execute(parts[0], parts.slice(1).concat(args), stdin);
                }
                if (this.commands[lowerCmd]) {
                    try { const r = this.commands[lowerCmd](args, stdin);
                        this.lastExit = r.exitCode; return r; } catch (e) { this.lastExit = 1; return { output: '',
                            error: `${cmdName}: ${e.message}\n`, exitCode: 1 }; }
                }
                // Check if it's an executable file in the filesystem
                const path = this.fs.resolve(cmdName);
                if (this.fs.exists(path) && this.fs.isFile(path) && this.fs.isExecutable(path)) {
                    // Execute it as a script
                    const result = this._source([cmdName]);
                    this.lastExit = result.exitCode;
                    return result;
                }
                this.lastExit = 127;
                return { output: '', error: `${cmdName}: command not found\n`, exitCode: 127 };
            }

            // ---------- main command runner with full chaining ----------
            runCommandLine(line) {
                // Strip comments
                let cleanLine = line.replace(/#.*$/, '').trim();
                if (!cleanLine) return { output: '', error: '', exitCode: 0 };

                // Check for background
                let background = false;
                if (cleanLine.endsWith('&')) {
                    background = true;
                    cleanLine = cleanLine.slice(0, -1).trim();
                }

                // Parse chaining: ; , && , ||
                const tokens = this._tokenize(cleanLine);
                if (tokens.length === 0) return { output: '', error: '', exitCode: 0 };

                // Find chain operators
                const commands = [];
                let current = [];
                let currentOp = ';';

                for (const t of tokens) {
                    if (t === ';' || t === '&&' || t === '||') {
                        if (current.length) {
                            commands.push({ cmd: current, op: currentOp });
                            current = [];
                        }
                        currentOp = t;
                    } else {
                        current.push(t);
                    }
                }
                if (current.length) {
                    commands.push({ cmd: current, op: currentOp });
                }

                let finalOutput = '';
                let finalError = '';
                let finalExit = 0;

                for (let i = 0; i < commands.length; i++) {
                    const { cmd, op } = commands[i];
                    // Execute this command segment
                    const result = this._executeSegment(cmd);
                    finalOutput += result.output;
                    finalError += result.error;
                    finalExit = result.exitCode;

                    // Check conditional execution
                    if (op === '&&' && finalExit !== 0) break;
                    if (op === '||' && finalExit === 0) break;
                }

                if (background && commands.length === 1) {
                    // Add to jobs
                    this.jobCounter++;
                    const job = {
                        id: this.jobCounter,
                        pid: 1000 + this.jobCounter,
                        cmd: cleanLine,
                        running: true,
                    };
                    this.jobs.push(job);
                    finalOutput = `[${job.id}] ${job.pid}\n` + finalOutput;
                }

                return { output: finalOutput, error: finalError, exitCode: finalExit };
            }

            _executeSegment(tokens) {
                // Find redirection
                let outFile = null,
                    appendMode = false,
                    inFile = null;
                const clean = [];
                for (let i = 0; i < tokens.length; i++) {
                    if (tokens[i] === '>') { outFile = tokens[++i];
                        appendMode = false; } else if (tokens[i] === '>>') { outFile = tokens[++i];
                        appendMode = true; } else if (tokens[i] === '<') { inFile = tokens[++i]; } else clean.push(tokens[
                        i]);
                }

                // Parse pipeline
                const segments = this._parsePipeline(clean);

                let stdin = '';
                if (inFile) { const p = this.fs.resolve(inFile);
                    stdin = this.fs.readFile(p) || ''; }

                let finalOut = '',
                    finalErr = '',
                    finalExit = 0;
                for (let i = 0; i < segments.length; i++) {
                    const seg = segments[i];
                    if (!seg.length) continue;
                    const [cmdName, ...args] = seg;
                    const result = this.execute(cmdName, args, stdin);
                    stdin = result.output;
                    finalErr += result.error;
                    finalExit = result.exitCode;
                    if (i === segments.length - 1) finalOut = result.output;
                }

                if (outFile) {
                    const p = this.fs.resolve(outFile);
                    if (appendMode) this.fs.appendFile(p, finalOut);
                    else this.fs.writeFile(p, finalOut);
                    finalOut = '';
                }

                return { output: finalOut, error: finalErr, exitCode: finalExit };
            }

            ctxMenu.style.left = e.clientX + 'px';
            ctxMenu.style.top = e.clientY + 'px';
            ctxMenu.innerHTML = `
            <button data-a="terminal">${iconSVG('terminal')} Open Terminal</button>
            <button data-a="files">${iconSVG('folder')} Open Files</button>
            <button data-a="settings">${iconSVG('gear')} Settings</button>
            <button data-a="about">${iconSVG('info')} About Slate</button>`;
            ctxMenu.style.display = 'block';
        });
        document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });
        ctxMenu.addEventListener('click', e => { const a = e.target.closest('button')?.dataset.a; if (a) { AudioEngine
                    .click();
                openApp(a); } });

        /* =========================================================
           TERMINAL APP
           ========================================================= */
        function renderMarked(container, text) {
            const re = new RegExp(M1 + '(.)' + M2 + '([^' + M3 + ']*)' + M3, 'g');
            let last = 0,
                m;
            const frag = document.createDocumentFragment();
            while ((m = re.exec(text))) {
                if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
                const span = document.createElement('span');
                span.className = m[1] === 'd' ? 'name-dir' : m[1] === 'm' ? 'grep-hit' : m[1] === 'c' ? 'out-ok' : (m[2]
                    .startsWith('.') ? 'name-hidden' : 'name-file');
                span.textContent = m[2];
                frag.appendChild(span);
                last = re.lastIndex;
            }
            if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
            container.appendChild(frag);
        }

        function initTerminal(win) {
            const out = document.createElement('div');
            out.className = 'mono-out';
            win.querySelector('.win-body').appendChild(out);

            function printLine(text, cls) {
                const line = document.createElement('div');
                line.className = 'term-line' + (cls ? ' ' + cls : '');
                renderMarked(line, text);
                out.appendChild(line);
                out.scrollTop = out.scrollHeight;
            }

            function promptFragment() {
                const home = '/home/' + fs.username;
                let short = fs.cwd;
                if (fs.cwd === home) short = '~';
                else if (fs.cwd.startsWith(home)) short = '~' + fs.cwd.slice(home.length);
                return { user: fs.username, host: fs.hostname, path: short };
            }

            function showPrompt() {
                const row = document.createElement('div');
                row.className = 'term-input-row';
                const p = document.createElement('span');
                p.className = 'prompt';
                const pr = promptFragment();
                p.innerHTML =
                    `<span class="p-user">${pr.user}</span><span class="p-at">@</span><span class="p-host">${pr.host}</span><span class="p-colon">:</span><span class="p-path">${pr.path}</span><span class="p-dollar">$</span>`;
                const input = document.createElement('input');
                input.type = 'text';
                input.autocomplete = 'off';
                input.spellcheck = false;
                input.className = 'term-input';
                row.appendChild(p);
                row.appendChild(input);
                out.appendChild(row);
                out.scrollTop = out.scrollHeight;
                input.focus();

                input.addEventListener('keydown', e => {
                    AudioEngine.keytick();
                    if (e.key === 'Enter') {
                        const cmdLine = input.value;
                        input.disabled = true;
                        const pr2 = promptFragment();
                        printLine(`${pr2.user}@${pr2.host}:${pr2.path}$ ${cmdLine}`);
                        if (cmdLine.trim()) {
                            shell.addHistory(cmdLine);
                            const result = shell.runCommandLine(cmdLine);
                            if (result.output === '\x1bCLEAR\x1b') { out.innerHTML = ''; } else {
                                if (result.output) { result.output.split('\n').forEach(l => { if (l) printLine(
                                        l); }); }
                                if (result.error) { result.error.split('\n').forEach(l => { if (l) printLine(l,
                                        'out-err'); }); }
                            }
                        }
                        showPrompt();
                    } else if (e.key === 'ArrowUp') { const prev = shell.getHistoryPrev(); if (prev !== null) { input
                            .value = prev; }
                        e.preventDefault(); } else if (e.key === 'ArrowDown') { const next = shell.getHistoryNext();
                        input.value = next !== null ? next : '';
                        e.preventDefault(); } else if (e.key === 'Tab') {
                        e.preventDefault();
                        const val = input.value;
                        const parts = val.split(/\s+/);
                        const lastPart = parts[parts.length - 1] || '';
                        if (parts.length === 1) {
                            const matches = Object.keys(shell.commands).filter(c => c.startsWith(lastPart));
                            if (matches.length === 1) input.value = matches[0] + ' ';
                        } else {
                            const dir = parts.slice(0, -1).join(' ');
                            const items = fs.listDir(fs.resolve(dir)) || fs.listDir(fs.cwd);
                            if (items) { const matches = items.filter(i => i.name.startsWith(lastPart)); if (
                                    matches.length === 1) { parts[parts.length - 1] = matches[0].name + (
                                        matches[0].isFile ? ' ' : '/');
                                    input.value = parts.join(' '); } }
                        }
                    }
                });
            }

            printLine('Slate OS — type "help" for a full command list.');
            printLine('');
            printLine('  · Command chaining: ; (always), && (and), || (or)');
            printLine('  · Background: &  —  jobs, fg, bg, kill');
            printLine('  · Scripting: source <file>, # comments');
            printLine('');
            showPrompt();
        }

        /* =========================================================
           FILES APP (better spacing)
           ========================================================= */
        function initFiles(win) {
            const grid = win.querySelector('#files-grid'),
                pathEl = win.querySelector('#files-path'),
                backBtn = win.querySelector('#files-back');
            let stack = [fs.cwd];

            function render() {
                grid.innerHTML = '';
                const cur = stack[stack.length - 1];
                pathEl.textContent = cur;
                backBtn.style.visibility = stack.length > 1 ? 'visible' : 'hidden';
                const items = (fs.listDir(cur) || []).filter(i => !i.name.startsWith('.'));
                items.sort((a, b) => { if (a.isFile && !b.isFile) return 1; if (!a.isFile && b.isFile) return -1; return a
                        .name.localeCompare(b.name); });
                if (!items.length) { const e = document.createElement('div');
                    e.className = 'f-empty';
                    e.textContent = 'Empty directory';
                    grid.appendChild(e); return; }
                for (const item of items) {
                    const div = document.createElement('div');
                    div.className = 'f-item';
                    div.innerHTML = `${chip(item.isFile?'file':'folder')}<div class="f-name">${item.name}</div>`;
                    div.addEventListener('dblclick', () => {
                        AudioEngine.click();
                        if (!item.isFile) { stack.push(cur === '/' ? '/' + item.name : cur + '/' + item.name);
                            render(); } else {
                            const path = cur + '/' + item.name;
                            openApp('editor');
                            setTimeout(() => { loadIntoEditor(path); }, 80);
                        }
                    });
                    grid.appendChild(div);
                }
            }
            backBtn.addEventListener('click', () => { if (stack.length > 1) { stack.pop();
                    render();
                    AudioEngine.click(); } });
            render();
        }

        /* =========================================================
           EDITOR APP
           ========================================================= */
        let editorCurrentPath = null;

        function loadIntoEditor(path) {
            const ta = document.getElementById('editor-area');
            const pathInput = document.getElementById('editor-path');
            const status = document.getElementById('editor-status');
            if (!ta) return;
            editorCurrentPath = path;
            ta.value = fs.readFile(path) || '';
            if (pathInput) pathInput.value = path;
            if (status) status.textContent = 'Loaded';
        }

        function saveEditor() {
            const ta = document.getElementById('editor-area');
            const pathInput = document.getElementById('editor-path');
            const status = document.getElementById('editor-status');
            if (!ta) return;
            const path = fs.resolve(pathInput.value || editorCurrentPath || '~/untitled.txt');
            fs.writeFile(path, ta.value);
            editorCurrentPath = path;
            AudioEngine.chime();
            if (status) status.textContent = 'Saved · ' + new Date().toLocaleTimeString();
        }

        function initEditor(win) {
            const ta = win.querySelector('#editor-area');
            ta.addEventListener('keydown', e => {
                AudioEngine.keytick();
                if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault();
                    saveEditor(); }
            });
            win.querySelector('#editor-save').addEventListener('click', saveEditor);
            if (editorCurrentPath) loadIntoEditor(editorCurrentPath);
        }

        /* =========================================================
           SETTINGS APP
           ========================================================= */
        function initSettings(win) {
            const body = win.querySelector('#settings-body');
            body.innerHTML = `
            <div class="settings-section"><h4>Sound</h4>
              <div class="settings-row"><label>Master volume<span class="hint">Interface clicks and boot chimes</span></label>
                <input type="range" id="set-vol" min="0" max="100" value="55"></div>
              <div class="settings-row"><label>Idle hum<span class="hint">Ambient low-frequency tone</span></label>
                <input type="checkbox" id="set-hum" checked></div>
            </div>
            <div class="settings-section"><h4>System</h4>
              <div class="settings-row"><label>Hostname</label>
                <input type="text" id="set-host" value="${fs.hostname}" style="background:var(--panel-3);color:var(--ink);border:1px solid var(--line-strong);border-radius:7px;padding:6px 10px;font-family:var(--font-disp);width:140px;"></div>
              <div class="settings-row"><label>Username</label>
                <span style="font-family:var(--font-disp);color:var(--brass-bright);">${fs.username}</span></div>
            </div>`;
            body.querySelector('#set-vol').addEventListener('input', e => AudioEngine.setVolume(e.target.value / 100));
            body.querySelector('#set-hum').addEventListener('change', e => { if (e.target.checked) AudioEngine
                    .startHum();
                else AudioEngine.stopHum(); });
            body.querySelector('#set-host').addEventListener('change', e => { fs.hostname = e.target.value || fs
                    .hostname; });
        }

        /* =========================================================
           APP CONTENT
           ========================================================= */
        function getAppContent(id) {
            if (id === 'terminal') return { title: 'Terminal', icon: 'terminal', w: 620, h: 440, html: '' };
            if (id === 'files') return { title: 'Files', icon: 'folder', w: 560, h: 420, html: `
            <div class="files-toolbar"><button id="files-back">← Back</button><span class="fpath" id="files-path">/home/slate</span></div>
            <div class="files-grid" id="files-grid"></div>` };
            if (id === 'editor') return { title: 'Text Editor', icon: 'file', w: 580, h: 440, html: `
            <div class="editor-toolbar">
              <input type="text" id="editor-path" placeholder="/home/slate/untitled.txt">
              <button id="editor-save">Save</button>
              <span class="editor-status" id="editor-status">Unsaved</span>
            </div>
            <textarea class="editor" id="editor-area" placeholder="Start typing…"></textarea>` };
            if (id === 'settings') return { title: 'Settings', icon: 'gear', w: 460, h: 440, html: `<div class="pad" id="settings-body"></div>` };
            if (id === 'about') return { title: 'About Slate', icon: 'info', w: 440, h: 460, html: `
            <div class="about-slate">
              <div class="big-mark">S</div>
              <div class="os-name">Slate OS</div>
              <div class="about-divider"></div>
              <div class="meta">
                Kernel&nbsp;&nbsp;6.12.0-slate<br>
                Shell&nbsp;&nbsp;&nbsp;&nbsp;bash (simulated)<br>
                Runtime&nbsp;HTML5 / CSS3 / ES6<br>
                <span style="display:inline-block; margin-top:8px;">
                  <a href="https://github.com/Soumyadxxp" target="_blank">github.com/Soumyadxxp</a>
                </span>
              </div>
              <div class="credit">Developed by Soumyadeep Basu</div>
            </div>` };
            return { title: 'App', icon: 'file', w: 420, h: 300, html: '<div class="pad">Unknown app.</div>' };
        }

        /* =========================================================
           INIT
           ========================================================= */
        buildLaunchers();
        runBoot();
        document.body.addEventListener('click', () => AudioEngine.ensure(), { once: true });

        window.addEventListener('resize', () => {
            document.querySelectorAll('.win').forEach(win => {
                const rect = win.getBoundingClientRect();
                const maxX = window.innerWidth - 50,
                    maxY = window.innerHeight - 50;
                if (rect.left > maxX) win.style.left = Math.max(10, maxX - rect.width) + 'px';
                if (rect.top > maxY) win.style.top = Math.max(44, maxY - rect.height) + 'px';
            });
        });

        console.log('%cSlate OS', 'color:#cf9a5c;font-weight:bold;');
        console.log('Developed by Soumyadeep Basu — type "help" in the terminal.');
    </script>
</body>
